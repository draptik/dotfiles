# Gruvbox Dark
set -g status-style "bg=colour237,fg=colour223"

set -g status-left-length 30
set -g status-left "#[bg=colour214,fg=colour235,bold] #S #[bg=colour237,fg=colour214,nobold] "

set -g status-right-length 40
set -g status-right "#[fg=colour246] %Y-%m-%d #[fg=colour223,bold]%H:%M "

set -g window-status-format         " #I:#W#{window_flags} "
set -g window-status-current-format "#[bg=colour214,fg=colour235,bold] #{?window_zoomed_flag,Z ,}#I:#W #[bg=colour237,fg=colour214,nobold] "
set -g window-status-style          "fg=colour246"
set -g window-status-current-style  "fg=colour214"

set -g pane-border-style        "fg=colour239"
set -g pane-active-border-style "fg=colour214"

set -g message-style "bg=colour214,fg=colour235,bold"
